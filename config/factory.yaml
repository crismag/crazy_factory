factory:
  mode: dry_run
  active_project: ""
  allow_application_writes: false
  allow_factory_writes: false
  allow_commit: false
  allow_push: false
  max_files_per_run: 5
  max_lines_per_file: 300
  require_report_every_run: true
  require_next_action_every_run: true
  state_dir: state

proposal_application:
  mode: preview_only
  allow_apply: false
  allow_delete: false
  require_owner_approval: true

validation:
  allow_run: false
  timeout_seconds: 60

mission:
  lock_stale_seconds: 3600

git:
  allow_auto_commit: false
  allow_auto_push: false
  allow_auto_merge: false
  commit_prefix: "factory:"
  allowed_auto_commit_paths:
    - apps/<active_project>/app
    - apps/<active_project>/docs
    - apps/<active_project>/tests
    - apps/<active_project>/factory_tasks
    - apps/<active_project>/factory_reports

ollama:
  base_url: "http://localhost:11434"
  timeout_seconds: 120
  stream: false

logging:
  log_dir: logs
  report_dir: reports

# Where the factory reads and writes. Config provides the defaults below; the
# CRAZY_FACTORY_* environment variables override the engine locations, and
# `crazy-admin startproject --path KEY=VALUE` / `set-path` override workbench
# folders per project. See scripts/settings.py.
paths:
  # Per-project workbench sub-folders (relative to a project's app_path).
  # Editing these changes the default layout for NEWLY created projects.
  # (config_dir is fixed at <app>/config — not configurable.)
  workbench:
    state_dir: state
    factory_state_dir: factory_state
    reports_dir: factory_reports
    tasks_dir: factory_tasks
    factory_context_dir: factory_context
    context_dir: context
  # Engine-level locations (relative to the repo root).
  engine:
    registry_path: config/projects.yaml
    factory_config_template: config/factory.yaml
    models_config: config/models.yaml
    seed_staging_base: factory_state/projects
    logs_dir: logs
    # Base for generated app workbenches. Default "apps" is in-repo. Set an
    # ABSOLUTE path (or CRAZY_FACTORY_APPS_BASE) to build apps outside the repo;
    # each project stays confined to <apps_base>/<id>.
    apps_base: apps
