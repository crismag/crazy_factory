# No project is active by default. An app to work on must be explicitly
# selected — the factory never picks one for you. To select one:
#   - grow a seed and promote it:
#       python3 scripts/context_growth.py start --seed examples/seeds/<x>.md \
#           --project-id <id>
#       python3 scripts/context_growth.py grow --project-id <id>   # repeat
#       python3 scripts/context_growth.py promote --project-id <id>
#   - or register a workbench under apps/<id>/ and set active_project below.
active_project: ""

# Registered application workbenches. `promote` adds entries here.
projects:
